<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты - Santorini</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/adaptive.css">
    <link rel="stylesheet" href="css/themes/light-theme.css" id="theme-style">
</head>
<body class="body">
<!-- Header -->
<header class="header" role="banner">
    <!-- Header content from index.html -->
</header>

<main class="main" role="main">
    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1>Контакты</h1>
            <nav class="breadcrumb" aria-label="Хлебные крошки">
                <a href="index.html">Главная</a>
                <span>/</span>
                <span aria-current="page">Контакты</span>
            </nav>
        </div>
    </section>

    <!-- Contact Info -->
    <section class="contact-info section">
        <div class="container">
            <div class="contact-info__grid">
                <div class="contact-info__card">
                    <svg width="40" height="40" aria-hidden="true">
                        <use href="assets/icons/sprite.svg#phone"></use>
                    </svg>
                    <h3>Телефон</h3>
                    <a href="tel:+79120388044">8 (912) 038-80-44</a>
                </div>

                <div class="contact-info__card">
                    <svg width="40" height="40" aria-hidden="true">
                        <use href="assets/icons/sprite.svg#email"></use>
                    </svg>
                    <h3>Email</h3>
                    <a href="mailto:info@santorini-hotel.ru">info@santorini-hotel.ru</a>
                </div>

                <div class="contact-info__card">
                    <svg width="40" height="40" aria-hidden="true">
                        <use href="assets/icons/sprite.svg#location"></use>
                    </svg>
                    <h3>Адрес</h3>
                    <p>298690, Россия, Крым, г. Ялта, пгт Форос, Форосский спуск, 1</p>
                </div>

                <div class="contact-info__card">
                    <svg width="40" height="40" aria-hidden="true">
                        <use href="assets/icons/sprite.svg#clock"></use>
                    </svg>
                    <h3>Режим работы</h3>
                    <p>Круглосуточно</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Contact Form & Map -->
    <section class="contact-section section">
        <div class="container">
            <div class="contact-section__grid">
                <!-- Contact Form -->
                <div class="contact-form-wrapper">
                    <h2>Напишите нам</h2>
                    <form class="contact-form" id="contact-form" novalidate>
                        <div class="form__group">
                            <label for="contact-name">ФИО *</label>
                            <input type="text" id="contact-name" name="name" required>
                            <span class="validation-message"></span>
                        </div>

                        <div class="form__group">
                            <label for="contact-email">Email *</label>
                            <input type="email" id="contact-email" name="email" required>
                            <span class="validation-message"></span>
                        </div>

                        <div class="form__group">
                            <label for="contact-phone">Телефон</label>
                            <input type="tel" id="contact-phone" name="phone" placeholder="+375XXXXXXXXX">
                            <span class="validation-message"></span>
                        </div>

                        <div class="form__group">
                            <label for="contact-message">Сообщение *</label>
                            <textarea id="contact-message" name="message" rows="5" required></textarea>
                            <span class="validation-message"></span>
                        </div>

                        <div class="form__checkbox">
                            <input type="checkbox" id="contact-consent" name="consent" required>
                            <label for="contact-consent">Согласен на обработку персональных данных *</label>
                        </div>

                        <button type="submit" class="btn btn--primary">Отправить</button>
                    </form>
                </div>

                <!-- Map -->
                <div class="map-wrapper">
                    <div id="map" class="map"></div>
                </div>
            </div>
        </div>
    </section>
</main>

<!-- Footer -->
<footer class="footer" role="contentinfo">
    <!-- Footer content from index.html -->
</footer>

<script src="js/config/constants.js"></script>
<script src="js/utils/storage.js"></script>
<script src="js/utils/validation.js"></script>
<script src="js/utils/theme-switcher.js"></script>
<script src="js/api/fetch.js"></script>
<script src="js/components/preloader.js"></script>
<script src="js/pages/contacts.js"></script>
<script src="js/main.js"></script>
<script src="https://api-maps.yandex.ru/2.1/?apikey=your-api-key&lang=ru_RU" defer></script>
</body>
</html>
